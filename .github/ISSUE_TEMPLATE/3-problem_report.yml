# Adapted for xsai-env from the XiangShan problem report template:
# https://github.com/OpenXiangShan/XiangShan/blob/kunminghu-v3/.github/ISSUE_TEMPLATE/3-problem.yaml

name: Build or runtime problem
description: Ask for help with a build, environment, or runtime problem that is not yet confirmed as a bug.
body:
  - type: markdown
    attributes:
      value: |
        Use this form when something is failing, but you are not yet sure whether the root cause is a bug in xsai-env, a local environment issue, or an upstream component issue.

        Include enough detail for someone else to reproduce the same failure.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you start
      options:
        - label: I checked the README and troubleshooting notes.
          required: true
        - label: I searched existing issues and did not find the same problem.
          required: true
        - label: I retried the workflow on the latest `master` commit.
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Problem area
      options:
        - Initial setup
        - Nix / direnv
        - LLVM / toolchain
        - Firmware / rootfs
        - QEMU flow
        - NEMU flow
        - XSAI RTL flow
        - CI / automation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What went wrong?
      description: Summarize the failure and attach logs instead of pasting very large outputs inline.
    validations:
      required: true
  - type: textarea
    id: actions
    attributes:
      label: What did you do before the failure?
      description: List the exact setup, build, and run steps in order.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and revision details
      description: |
        Attach the archive generated by `bash scripts/bug-report.sh` if possible.

        If you cannot attach the archive, include the most relevant environment details here.
      value: |
        - Host OS:
        - Kernel:
        - Nix version (if used):
        - direnv version (if used):
        - gcc version:
        - clang version:
        - java version:
        - Repo commit:
        - Submodule state summary:
        - Build command:
        - Run command:
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Include links, screenshots, workload details, or suspicions about which component may be responsible.
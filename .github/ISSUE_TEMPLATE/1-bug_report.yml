# Adapted for xsai-env from the XiangShan bug report template:
# https://github.com/OpenXiangShan/XiangShan/blob/kunminghu-v3/.github/ISSUE_TEMPLATE/1-bug_report.yml

name: Bug report
description: Report a confirmed incorrect behavior in xsai-env or its integration flow.
body:
  - type: markdown
    attributes:
      value: |
        Use this form for confirmed bugs in xsai-env integration, build, packaging, or runtime flows.

        Before opening an issue, verify that the failure still reproduces on the latest `master` commit.

        If the root cause is clearly inside a vendored upstream repository such as XSAI, NEMU, or riscv-rootfs, please file the issue upstream as well and link it here if xsai-env integration is involved.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you start
      options:
        - label: I checked the current README and troubleshooting notes.
          required: true
        - label: I searched existing issues and did not find the same report.
          required: true
        - label: I reproduced the issue on the latest `master` commit.
          required: true
        - label: I verified whether this is an xsai-env integration issue or an upstream component issue.
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Environment bootstrap
        - Nix / direnv
        - LLVM / toolchain
        - Firmware / rootfs
        - QEMU flow
        - NEMU flow
        - XSAI RTL flow
        - CI / automation
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: bug
    attributes:
      label: What is the bug?
      description: Describe the incorrect behavior clearly. Attach logs instead of pasting large outputs inline.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Provide exact steps, commands, inputs, and any minimal workload needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and revision details
      description: |
        Attach the archive generated by `bash scripts/bug-report.sh` if possible.

        If you cannot attach the archive, include the most relevant environment details here.
      value: |
        - Host OS:
        - Kernel:
        - Nix version (if used):
        - direnv version (if used):
        - gcc version:
        - clang version:
        - java version:
        - Repo commit:
        - Submodule state summary:
        - Build command:
        - Run command:
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Include possible root-cause guesses, related commits, or links to upstream issues if relevant.